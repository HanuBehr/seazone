        <rect x="0" y="0" width="84" height="64" rx="10" fill="#138a7a" opacity="0.12"/>
        <text x="102" y="20" fill="#143b35" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Bali Beach Villa</text>
        <text x="236" y="20" fill="#138a7a" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">BLI001</text>
        <text x="102" y="48" fill="#69786f" font-family="Arial, Helvetica, sans-serif" font-size="16">Canggu, Badung · Beach villa</text>
        <text x="102" y="76" fill="#69786f" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">6 guests · 3 beds · Parking</text>
