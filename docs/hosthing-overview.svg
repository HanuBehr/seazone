      <text x="0" y="148" fill="#143b35" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">⌖ Australia</text>
      <text x="0" y="174" fill="#69786f" font-family="Arial, Helvetica, sans-serif" font-size="16">AUD</text>
      <text x="184" y="160" fill="#69786f" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">2 properties</text>
      <line x1="0" y1="194" x2="250" y2="194" stroke="#e0bd8d"/>
      <text x="0" y="228" fill="#143b35" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">⌖ United States</text>
      <text x="0" y="254" fill="#69786f" font-family="Arial, Helvetica, sans-serif" font-size="16">USD</text>
      <text x="184" y="240" fill="#69786f" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">2 properties</text>
