name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/hosthing
      GUEST_LINK_SECRET: ci-placeholder-guest-link-secret
      OPENAI_API_KEY: ""
      AI_CHAT_MAX_MESSAGES: "12"
      AI_CHAT_MAX_INPUT_CHARS: "4000"
      AI_CHAT_MAX_OUTPUT_TOKENS: "500"
      AI_CHAT_RATE_LIMIT_WINDOW_MS: "60000"
      AI_CHAT_RATE_LIMIT_MAX: "12"
      AI_CHAT_TOKEN_BUDGET_PER_WINDOW: "6000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
